name: Release

# Publishes to PyPI and attaches build artifacts to the GitHub Release
# whenever a version tag (e.g. v3.1.0) is pushed.
#
# One-time setup required before this works:
#   1. Create a PyPI project + a "Trusted Publisher" pointing at this repo
#      and this workflow (release.yml), environment name "pypi":
#      https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   2. Create a GitHub Environment named "pypi" (Settings → Environments).
# No API tokens or secrets are needed — publishing uses OIDC.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    name: Attach artifacts to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nevercheese-pcileech-memprocfs-mcp
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
