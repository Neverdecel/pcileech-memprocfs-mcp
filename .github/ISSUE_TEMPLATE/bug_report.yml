name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill out the sections
        below so it can be reproduced quickly.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I ask Claude to "...", the tool returns/raises ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact prompt / tool call and parameters, if applicable.
      placeholder: |
        1. Connect device (type: fpga)
        2. Call `module_list` with pid=1234
        3. ...
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device / backend
      options:
        - FPGA (Screamer / ZDMA / etc.)
        - File / memory dump (file://)
        - Remote LeechAgent (rpc://)
        - Not device-related
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the release tag.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any error output. This will be formatted as code.
      render: shell
