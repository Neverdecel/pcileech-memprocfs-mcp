name: Feature request
description: Suggest a new tool, capability, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        Describe the tool or change. If it's a new tool, what would it do, what
        parameters would it take, and what would it return?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New MCP tool
        - Existing tool improvement
        - Engine / RE support (UE, Unity, etc.)
        - Packaging / install / docs
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you currently use, or other approaches.
